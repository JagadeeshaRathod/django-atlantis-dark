name: Run Django with ngrok (v2 working)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  run-django:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTIONS: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install virtual environment and dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply Django migrations
        run: |
          source venv/bin/activate
          python manage.py migrate --noinput

      - name: Start Django dev server
        run: |
          source venv/bin/activate
          nohup python manage.py runserver 0.0.0.0:8000 &
          sleep 4

      # ✅ DOWNLOAD NGROK v2 (WORKING BUILD)
      - name: Download ngrok v2
        run: |
          wget -q https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip -O ngrok.zip
          unzip ngrok.zip
          chmod +x ngrok

      - name: Auth ngrok
        run: |
          ./ngrok authtoken 3BR12d3qQaR6GaBMdnRT1eIwvbj_3QzZ2s9k2JPnDbF8zNcqY

      - name: Start ngrok tunnel
        run: |
          nohup ./ngrok http 8000 > /dev/null 2>&1 &
          sleep 6

      - name: Get public ngrok URL
        run: |
          echo "🔍 Extracting public URL..."
          curl -s http://127.0.0.1:4040/api/tunnels | jq -r '.tunnels[0].public_url'

      - name: Print runner IP (debug)
        run: curl -s ifconfig.me
