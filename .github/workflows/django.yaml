name: Run Django with ngrok

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  run-django:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTIONS: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install virtual environment and dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply Django migrations
        run: |
          source venv/bin/activate
          python manage.py migrate --noinput

      - name: Start Django development server
        run: |
          source venv/bin/activate
          nohup python manage.py runserver 0.0.0.0:8000 &
          sleep 3

      # ✅ FIXED: DOWNLOAD NGROK V3 (WORKS ON UBUNTU)
      - name: Download ngrok v3
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -O ngrok.tgz
          tar -xzf ngrok.tgz
          chmod +x ngrok

      - name: Authenticate ngrok
        run: |
          ./ngrok authtoken 3BR12d3qQaR6GaBMdnRT1eIwvbj_3QzZ2s9k2JPnDbF8zNcqY

      - name: Start ngrok tunnel
        run: |
          nohup ./ngrok http 8000 --log=debug > ngrok.log 2>&1 &
          sleep 8

      - name: Extract Public ngrok URL
        run: |
          echo "🔍 Extracting URL..."
          URL=$(grep -oP 'https://[a-zA-Z0-9.-]+\.ngrok-free\.app' ngrok.log | head -1)
          echo "✅ PUBLIC URL: $URL"

      - name: Show full ngrok log
        run: |
          echo "📄 ngrok.log content:"
          cat ngrok.log
