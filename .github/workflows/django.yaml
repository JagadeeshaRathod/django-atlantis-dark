name: Run Django with ngrok

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  run-django:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTIONS: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install virtual environment and dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply Django migrations
        run: |
          source venv/bin/activate
          python manage.py migrate --noinput

      - name: Start Django development server
        run: |
          source venv/bin/activate
          nohup python manage.py runserver 0.0.0.0:8000 &
          sleep 5

      - name: Download ngrok v3
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -O ngrok.tgz
          tar -xvf ngrok.tgz
          chmod +x ngrok

      - name: Authenticate ngrok
        run: |
          ./ngrok config add-authtoken 3BR12d3qQaR6GaBMdnRT1eIwvbj_3QzZ2s9k2JPnDbF8zNcqY

      - name: Start ngrok tunnel
        run: |
          nohup ./ngrok http 8000 > ngrok.log 2>&1 &
          sleep 8

      - name: Extract Public ngrok URL
        run: |
          echo "🔍 Extracting URL..."
          cat ngrok.log | grep -oP 'url=https://[a-zA-Z0-9.-]+\.ngrok-free\.app' | head -1 | sed 's/url=//' > public_url.txt
          echo "✅ PUBLIC URL:"
          cat public_url.txt

      - name: Show running processes
        run: ps -ef | grep ngrok
