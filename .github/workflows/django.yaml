name: Run Django Application with ngrok

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  run-django:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTIONS: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install virtual environment and dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply Django migrations
        run: |
          source venv/bin/activate
          python manage.py migrate --noinput

      - name: Start Django development server
        run: |
          source venv/bin/activate
          nohup python manage.py runserver 0.0.0.0:8000 &
          sleep 5

      - name: Install ngrok
        run: |
          wget -q -O ngrok.zip https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.zip
          unzip ngrok.zip
          chmod +x ngrok

      - name: Authenticate ngrok
        run: |
          ./ngrok config add-authtoken 3BR12d3qQaR6GaBMdnRT1eIwvbj_3QzZ2s9k2JPnDbF8zNcqY

      - name: Start ngrok tunnel on port 8000
        run: |
          nohup ./ngrok http 8000 --log=stdout > ngrok.log 2>&1 &
          sleep 8

      - name: Show public ngrok URL
        run: |
          echo "🔗 Public ngrok URL:"
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'

      - name: Check Django is running
        run: curl -I http://localhost:8000
