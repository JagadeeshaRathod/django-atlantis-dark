name: Run Django with ngrok

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  run-django:
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTIONS: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install virtual environment and dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply Django migrations
        run: |
          source venv/bin/activate
          python manage.py migrate --noinput

      - name: Start Django server
        run: |
          source venv/bin/activate
          nohup python manage.py runserver 0.0.0.0:8000 &
          sleep 5

      # ✅ Download ngrok v3 (correct version)
      - name: Download ngrok v3
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz -O ngrok.tgz
          tar -xvf ngrok.tgz
          chmod +x ngrok

      # ✅ Authenticate ngrok v3
      - name: Authenticate ngrok
        run: |
          ./ngrok config add-authtoken 3BR12d3qQaR6GaBMdnRT1eIwvbj_3QzZ2s9k2JPnDbF8zNcqY

      # ✅ Start tunnel
      - name: Start ngrok public URL
        run: |
          nohup ./ngrok http 8000 > ngrok.log 2>&1 &
          sleep 8

      - name: Show public ngrok URL
        run: |
          echo "🔗 Public URL:"
          curl -s http://127.0.0.1:4040/api/tunnels | grep -o 'https://[a-zA-Z0-9.-]*\.ngrok-free\.app'
