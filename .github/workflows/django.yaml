name: Run Django Application

on:
  push:
    branches: ["main"]    # ✅ Trigger on any push to main
  pull_request:
    branches: ["main"]    # ✅ Trigger on PR targeting main
  workflow_dispatch:       # ✅ Allow manual run

jobs:
  run-django:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install virtual environment and dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply Django migrations
        run: |
          source venv/bin/activate
          python manage.py migrate --noinput

      - name: Start Django development server
        run: |
          source venv/bin/activate
          nohup python manage.py runserver 0.0.0.0:8000 &
          sleep 5

      - name: Check if Django server is running
        run: |
          echo "Checking http://localhost:8000 ..."
          curl -I http://localhost:8000
