name: Django with Cloudflare Tunnel

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  run-django:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install dependencies
      run: |
        python3 -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt

    - name: Run migrations
      run: |
        source venv/bin/activate
        python manage.py migrate --noinput

    - name: Start Django server
      run: |
        source venv/bin/activate
        nohup python manage.py runserver 0.0.0.0:8000 &
        sleep 5

    # ✅ Install cloudflared
    - name: Install cloudflared
      run: |
        sudo apt-get update
        sudo apt-get install -y cloudflared

    # ✅ Create public tunnel
    - name: Start Cloudflare Tunnel
      run: |
        nohup cloudflared tunnel --url http://localhost:8000 --logfile tunnel.log &
        sleep 6

    - name: Show tunnel URL
      run: |
        echo "✅ Public URL:"
        grep -oP 'https://[-a-zA-Z0-9]+\.trycloudflare\.com' tunnel.log
        echo "If empty, check full log below:"
        cat tunnel.log
